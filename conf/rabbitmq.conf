# https://github.com/rabbitmq/rabbitmq-server/blob/v3.7.x/docs/rabbitmq.conf.example

## Consumer acknowledgement timeout.
##
## How long the broker waits for a delivered-but-unacknowledged message before
## it closes the channel (PRECONDITION_FAILED). The default is 30 minutes, which
## kills long-running tasks such as large file copies. Raised to 24 hours so
## copies that run longer than 30 minutes are not interrupted.
## Value is in milliseconds. See https://www.rabbitmq.com/consumers.html#acknowledgement-timeout
consumer_timeout = 86400000

## Logging settings.
##
## See https://rabbitmq.com/logging.html and https://github.com/erlang-lager/lager for details.
##

## Log directory, taken from the RABBITMQ_LOG_BASE env variable by default.
##
# log.dir = /var/log/rabbitmq

## Logging to file. Can be false or a filename.
## Default:
# log.file = rabbit.log

## To disable logging to a file
# log.file = false

## Log level for file logging
##
log.file.level = info

## File rotation config. No rotation by default.
## DO NOT SET rotation date to ''. Leave the value unset if "" is the desired value
# log.file.rotation.date = $D0
# log.file.rotation.size = 0

## Logging to console (can be true or false)
##
log.console = true

## Log level for console logging
##
log.console.level = info

## Logging to the amq.rabbitmq.log exchange (can be true or false)
##
# log.exchange = false

## Log level to use when logging to the amq.rabbitmq.log exchange
##
# log.exchange.level = info

