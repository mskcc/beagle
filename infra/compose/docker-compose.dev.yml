services:
  api:
    init: true
    image: mskcc/beagle:2.1.0
    networks:
      - beagle_net
    build:
      context: .
    working_dir: /app
    command: python manage.py runserver 0:5007 --noreload
    volumes:
      - ./src:/app:z
    env_file: .env.dev
    environment:
      - BEAGLE_RABBITMQ_URL=${BEAGLE_RABBITMQ_URL}:${BEAGLE_RABBITMQ_PORT}
      - PYTHONPATH=/app/src
    ports:
      - "5007:5007"
    depends_on:
      - db
      - rabbitmq
      - memcached

  worker:
    build:
      context: .
    working_dir: /app
    networks:
      - beagle_net
    command: celery -A beagle_etl worker -l info
    volumes:
      - ./src:/app:z
    env_file: .env.dev
    environment:
      - BEAGLE_RABBITMQ_URL=${BEAGLE_RABBITMQ_URL}:${BEAGLE_RABBITMQ_PORT}
      - PYTHONPATH=/app/src
    depends_on:
      - rabbitmq
      - db

  beat:
    build:
      context: .
    working_dir: /app
    networks:
      - beagle_net
    command: celery -A beagle_etl beat -l info
    volumes:
      - ./src:/app:z
    env_file: .env.dev
    environment:
      - BEAGLE_RABBITMQ_URL=${BEAGLE_RABBITMQ_URL}:${BEAGLE_RABBITMQ_PORT}
      - PYTHONPATH=/app/src
    depends_on:
      - rabbitmq
      - db

  db:
    image: postgres:16
    working_dir: /app
    networks:
      - beagle_net
    env_file: .env.dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data:z
      - .:/app:z

  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - beagle_net
    env_file: .env.dev
    environment:
      - RABBITMQ_DEFAULT_USER=${BEAGLE_RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${BEAGLE_RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"  # management UI

  memcached:
    image: memcached:1.6
    networks:
      - beagle_net
    ports:
      - "11211:11211"

volumes:
  pgdata:

networks:
  beagle_net:
