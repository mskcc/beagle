services:
  beagle_create_volumes:
    image: alpine:3.8
    restart: "no"
    volumes:
      - postgres_path:/postgres
      - logs_path:/logs
      - static_path:/static
      - celery_path:/celery
      - rabbitmq_path:/rabbitmq
    # Inheriting the chown logic from your original setup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        chown -R ${DOCKER_UID}:${DOCKER_GID} /postgres /logs /static /celery /rabbitmq

  beagle_postgres:
    image: postgres:17-trixie
    networks:
      - voyager_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${BEAGLE_DB_USERNAME} -d $${BEAGLE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_path:/var/lib/postgresql/data/

  beagle_rabbitmq:
    image: rabbitmq:4.0.6-management-alpine
    networks:
      - voyager_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - rabbitmq_path:/var/lib/rabbitmq/

  beagle:
    image: mskcc/beagle:${BEAGLE_VERSION}
    build:
      context: ./
      dockerfile: Dockerfile
    networks:
      - voyager_net
    env_file:
      - ./.env.${ENV}
    depends_on:
      beagle_postgres:
        condition: service_healthy
      beagle_rabbitmq:
        condition: service_healthy

  # All Celery workers inherit the same base image and env
  beagle_celery_beat: &worker
    image: mskcc/beagle:${BEAGLE_VERSION}
    networks:
      - voyager_net
    env_file:
      - ./.env.${ENV}
    depends_on:
      - beagle_rabbitmq

  beagle_celery_default_queue:
    <<: *worker
  beagle_celery_runner_queue:
    <<: *worker
  beagle_celery_job_scheduler_queue:
    <<: *worker
  beagle_echo_consumer:
    <<: *worker

networks:
  voyager_net:
    name: voyager_network_${BEAGLE_DEPLOYMENT}

volumes:
  postgres_path:
  logs_path:
  static_path:
  celery_path:
  rabbitmq_path:
